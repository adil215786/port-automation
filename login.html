<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Port Automation - Login</title>
<style>
  :root {
    --brand: #1a73e8;
    --brand-dark: #1557b0;
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1e2532;
    --muted: #6b7280;
    --border: #e2e8f0;
    --error: #dc2626;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    color: var(--text);
    background: #fff;
    transition: border-color 0.15s;
    margin-bottom: 18px;
  }
  input:focus {
    outline: none;
    border-color: var(--brand);
  }
  .btn {
    width: 100%;
    padding: 15px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 52px;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: var(--error);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Port Automation</h1>
    <p>Sign in to continue</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <label for="username">Username</label>
  <input type="text" id="username" autocomplete="username" autocapitalize="none" placeholder="Enter username">
  <label for="pin">PIN</label>
  <input type="tel" id="pin" autocomplete="current-password" placeholder="Enter PIN" maxlength="20">
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
</div>
<script>
  // Auto-focus
  document.getElementById('username').focus();

  // Allow Enter key
  document.getElementById('pin').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('pin').focus();
  });

  async function doLogin() {
    var btn = document.getElementById('loginBtn');
    var errEl = document.getElementById('errorMsg');
    var username = document.getElementById('username').value.trim();
    var pin = document.getElementById('pin').value.trim();

    errEl.classList.remove('visible');

    if (!username || !pin) {
      showError('Please enter your username and PIN.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      var res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username: username, pin: pin })
      });
      var data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Login failed');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      // Redirect based on admin status
      if (data.user && data.user.is_admin) {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } catch (err) {
      showError('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
